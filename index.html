<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyFirstCodex</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f7f7fb, #e7ecff);
      color: #111827;
    }
    main {
      width: min(720px, calc(100% - 32px));
      padding: 48px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(40px, 7vw, 72px);
      letter-spacing: -0.06em;
    }
    p {
      margin: 0;
      font-size: 20px;
      line-height: 1.6;
      color: #4b5563;
    }
    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #0f172a, #1e1b4b);
        color: #f9fafb;
      }
      main {
        background: rgba(15, 23, 42, 0.82);
      }
      p {
        color: #cbd5e1;
      }
      .badge {
        background: #f9fafb;
        color: #111827;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">PUBLIC HTML PAGE</div>
    <h1>MyFirstCodex</h1>
    <p>GitHub repository is public, and this HTML page is ready for external access.</p>
  </main>
</body>
</html>
